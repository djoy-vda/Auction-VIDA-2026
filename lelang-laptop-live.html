<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lelang Laptop Kantor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 200; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 16px; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #0f3460; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  .login-box { background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .login-box h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a2e; }
  .login-box p { font-size: 14px; color: #888; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
  .login-box input:focus { outline: none; border-color: #0f3460; }
  .login-error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .user-info { font-size: 13px; opacity: 0.8; }
  .header-actions { display: flex; gap: 8px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #0f3460; color: white; }
  .btn-primary:hover:not(:disabled) { background: #1a4a7a; }
  .btn-success { background: #27ae60; color: white; }
  .btn-success:hover { background: #2ecc71; }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-danger:hover { background: #c0392b; }
  .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; }
  .btn-outline:hover { border-color: white; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-bid { background: #e67e22; color: white; }
  .btn-bid:hover:not(:disabled) { background: #d35400; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .stat-card .label { font-size: 13px; color: #888; margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }

  .search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-bar input { flex: 1; min-width: 200px; padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
  .search-bar input:focus { outline: none; border-color: #0f3460; }
  .search-bar select { padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }

  .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .refresh-bar .last-sync { font-size: 12px; color: #aaa; }
  .section-title { font-size: 18px; font-weight: 700; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 32px; }

  .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
  .card-header h3 { font-size: 16px; font-weight: 700; }
  .card-body { padding: 20px; }
  .card-footer { padding: 12px 20px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; justify-content: flex-end; }

  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-active { background: #d4edda; color: #155724; }
  .badge-closed { background: #f8d7da; color: #721c24; }

  .spec-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #f8f8f8; }
  .spec-row:last-child { border-bottom: none; }
  .spec-label { color: #888; flex-shrink: 0; margin-right: 12px; }
  .spec-value { font-weight: 600; text-align: right; word-break: break-word; }

  .price-display { margin-top: 12px; padding: 12px; background: #f8f9fa; border-radius: 8px; text-align: center; }
  .price-display .current-label { font-size: 12px; color: #888; }
  .price-display .current-price { font-size: 24px; font-weight: 700; color: #e67e22; }
  .price-display .start-price { font-size: 12px; color: #aaa; text-decoration: line-through; }

  .bid-history { margin-top: 12px; max-height: 200px; overflow-y: auto; }
  .bid-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 4px; }
  .bid-item:nth-child(odd) { background: #f8f9fa; }
  .bid-item .bidder { font-weight: 600; }
  .bid-item .bid-amount { color: #e67e22; font-weight: 700; }
  .bid-item .bid-time { color: #aaa; font-size: 11px; }
  .bid-item.winner { background: #d4edda; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
  .form-group input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #0f3460; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }

  .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .toggle-history { font-size: 13px; color: #0f3460; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 8px; color: white; font-size: 14px; font-weight: 600; z-index: 300; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-success { background: #27ae60; }
  .toast-error { background: #e74c3c; }

  @media (max-width: 600px) {
    .header { padding: 16px; }
    .header h1 { font-size: 18px; }
    .grid { grid-template-columns: 1fr; }
    .container { padding: 16px 8px; }
  }
</style>
</head>
<body>

<script>
  // ===========================================================
  // GANTI URL DI BAWAH DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
  // ===========================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbweUQd6neEVFmZoByjnoTwRjQhIGiaKpIvbrnaHb42Bqztk_PQWkLzX2aJHFuj-ghPK/exec';

  // Admin emails - hanya admin yang bisa tutup/buka lelang
  const ADMIN_EMAILS = ['djoyo.sukoco@vida.id'];
</script>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div>Memuat data...</div>
</div>

<!-- Login Page -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>Lelang Laptop Kantor</h1>
    <p>Masuk dengan email kantor untuk melihat dan mengikuti lelang</p>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="nama@vida.id" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk</button>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none">
  <div class="header">
    <h1>Lelang Laptop Kantor</h1>
    <div class="header-right">
      <div class="user-info">Login: <strong id="userName"></strong></div>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="refreshData()">Refresh</button>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Laptop</div>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Sedang Dilelang</div>
        <div class="value" id="statActive">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Sudah Terjual</div>
        <div class="value" id="statClosed">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Nilai Bid Tertinggi</div>
        <div class="value" id="statValue">Rp 0</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchBox" placeholder="Cari laptop (nama, serial, auction ID)..." oninput="renderCards()">
      <select id="filterStatus" onchange="renderCards()">
        <option value="all">Semua Status</option>
        <option value="active">Aktif</option>
        <option value="closed">Terjual</option>
      </select>
    </div>

    <div class="refresh-bar">
      <div class="section-title">Daftar Laptop Lelang</div>
      <div class="last-sync" id="lastSync"></div>
    </div>

    <div class="grid" id="laptopGrid"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">&#128187;</div>
      <p>Tidak ada laptop yang cocok dengan pencarian.</p>
    </div>
  </div>
</div>

<!-- Bid Modal -->
<div class="modal-overlay" id="bidModalOverlay" onclick="closeBidModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Submit Penawaran</h2>
    <input type="hidden" id="bidLaptopId">
    <div class="form-group">
      <label>Nama Penawar</label>
      <input type="text" id="bidName" readonly style="background:#f0f0f0">
    </div>
    <div class="form-group">
      <label>Jumlah Penawaran (Rp)</label>
      <input type="number" id="bidAmount" placeholder="Masukkan jumlah" min="0">
    </div>
    <div id="bidMinInfo" style="font-size:13px;color:#888;margin-top:-8px;margin-bottom:12px;"></div>
    <div class="form-actions">
      <button class="btn" style="background:#eee;color:#333" onclick="closeBidModal()">Batal</button>
      <button class="btn btn-bid" id="submitBidBtn" onclick="submitBid()">Submit Bid</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentUser = null;
  let laptops = [];
  let allBids = [];
  let isLoading = false;

  function formatRp(n) {
    return 'Rp ' + Number(n).toLocaleString('id-ID');
  }

  function showToast(msg, type) {
    type = type || 'success';
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast toast-' + type + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
  }

  // --- API ---
  function apiGet(action, params) {
    params = params || {};
    var url = API_URL + '?action=' + encodeURIComponent(action);
    Object.keys(params).forEach(function(k) {
      url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    });
    return fetch(url).then(function(res) { return res.json(); });
  }

  function apiPost(data) {
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    }).then(function(res) { return res.json(); });
  }

  // --- Auth ---
  function doLogin() {
    var email = document.getElementById('loginEmail').value.trim().toLowerCase();
    if (!email || email.indexOf('@') === -1) {
      document.getElementById('loginError').textContent = 'Masukkan email yang valid';
      document.getElementById('loginError').style.display = 'block';
      return;
    }

    showLoading(true);
    apiGet('login', { email: email }).then(function(result) {
      if (result.error) {
        document.getElementById('loginError').textContent = result.error;
        document.getElementById('loginError').style.display = 'block';
        showLoading(false);
        return;
      }

      currentUser = { email: result.email, name: result.name };
      sessionStorage.setItem('auctionUser', JSON.stringify(currentUser));

      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userName').textContent = currentUser.name + ' (' + currentUser.email + ')';

      refreshData();
    }).catch(function(err) {
      document.getElementById('loginError').textContent = 'Gagal terhubung ke server. Pastikan URL API sudah benar.';
      document.getElementById('loginError').style.display = 'block';
      showLoading(false);
    });
  }

  function doLogout() {
    currentUser = null;
    sessionStorage.removeItem('auctionUser');
    document.getElementById('loginPage').style.display = '';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginEmail').value = '';
  }

  function isAdmin() {
    return currentUser && ADMIN_EMAILS.indexOf(currentUser.email.toLowerCase()) !== -1;
  }

  // --- Data ---
  function refreshData() {
    if (isLoading) return;
    isLoading = true;
    showLoading(true);

    Promise.all([
      apiGet('getLaptops'),
      apiGet('getAllBids')
    ]).then(function(results) {
      laptops = results[0].laptops || [];
      allBids = results[1].bids || [];
      renderCards();
      updateStats();
      document.getElementById('lastSync').textContent = 'Terakhir sync: ' + new Date().toLocaleTimeString('id-ID');
      isLoading = false;
      showLoading(false);
    }).catch(function(err) {
      showToast('Gagal memuat data: ' + err.message, 'error');
      isLoading = false;
      showLoading(false);
    });
  }

  function getLaptopBids(laptopId) {
    return allBids.filter(function(b) {
      return b.laptopId.toString() === laptopId.toString();
    }).sort(function(a, b) {
      return Number(b.amount) - Number(a.amount);
    });
  }

  function updateStats() {
    var total = laptops.length;
    var active = laptops.filter(function(l) { return l.status === 'active'; }).length;
    var closed = laptops.filter(function(l) { return l.status === 'closed'; }).length;
    var totalValue = 0;
    laptops.forEach(function(l) {
      var bids = getLaptopBids(l.id);
      if (bids.length > 0) totalValue += Number(bids[0].amount);
    });
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statClosed').textContent = closed;
    document.getElementById('statValue').textContent = formatRp(totalValue);
  }

  // --- Render ---
  function renderCards() {
    var search = (document.getElementById('searchBox').value || '').toLowerCase();
    var statusFilter = document.getElementById('filterStatus').value || 'all';

    var filtered = laptops.filter(function(l) {
      var matchSearch = !search ||
        (l.name || '').toLowerCase().indexOf(search) !== -1 ||
        (l.serial || '').toLowerCase().indexOf(search) !== -1 ||
        (l.auctionId || '').toLowerCase().indexOf(search) !== -1;
      var matchStatus = statusFilter === 'all' || l.status === statusFilter;
      return matchSearch && matchStatus;
    });

    var grid = document.getElementById('laptopGrid');
    var empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';

    grid.innerHTML = filtered.map(function(l) {
      var bids = getLaptopBids(l.id);
      var highestBid = bids.length > 0 ? Number(bids[0].amount) : 0;
      var currentPrice = highestBid || Number(l.startPrice);
      var isActive = l.status === 'active';
      var statusBadge = isActive
        ? '<span class="badge badge-active">Aktif</span>'
        : '<span class="badge badge-closed">Terjual</span>';

      var bidRows = bids.map(function(b, i) {
        var winClass = (!isActive && i === 0) ? ' winner' : '';
        return '<div class="bid-item' + winClass + '">' +
          '<span class="bidder">' + b.name + (!isActive && i === 0 ? ' &#9733;' : '') + '</span>' +
          '<span>' +
            '<span class="bid-amount">' + formatRp(b.amount) + '</span> ' +
            '<span class="bid-time">' + b.time + '</span>' +
          '</span>' +
        '</div>';
      }).join('');

      var adminButtons = '';
      if (isAdmin()) {
        if (isActive) {
          adminButtons = '<button class="btn btn-danger btn-sm" onclick="closeLelang(\'' + l.id + '\')">Tutup Lelang</button>';
        } else {
          adminButtons = '<button class="btn btn-sm" style="background:#eee;color:#333" onclick="reopenLelang(\'' + l.id + '\')">Buka Kembali</button>';
        }
      }

      return '<div class="card">' +
        '<div class="card-header">' +
          '<h3>' + l.name + '</h3>' +
          statusBadge +
        '</div>' +
        '<div class="card-body">' +
          '<div class="spec-row"><span class="spec-label">Auction ID</span><span class="spec-value">' + (l.auctionId || '-') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">Serial</span><span class="spec-value">' + (l.serial || '-') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">Prosesor</span><span class="spec-value">' + (l.processor || '-') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">RAM</span><span class="spec-value">' + (l.ram || '-') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">Storage</span><span class="spec-value">' + (l.storage || '-') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">Kondisi</span><span class="spec-value">' + (l.condition || 'Baik') + '</span></div>' +
          '<div class="spec-row"><span class="spec-label">Dibeli</span><span class="spec-value">' + (l.purchased || '-') + '</span></div>' +
          (l.notes ? '<div class="spec-row"><span class="spec-label">Catatan</span><span class="spec-value">' + l.notes + '</span></div>' : '') +
          '<div class="price-display">' +
            (highestBid > 0 ? '<div class="start-price">Harga awal: ' + formatRp(l.startPrice) + '</div>' : '<div class="current-label">Harga Awal</div>') +
            '<div class="current-price">' + formatRp(currentPrice) + '</div>' +
            '<div class="current-label">' + bids.length + ' penawaran</div>' +
          '</div>' +
          (bids.length ? '<span class="toggle-history" onclick="toggleHistory(\'' + l.id + '\')">Lihat Riwayat Bid (' + bids.length + ')</span>' +
            '<div class="bid-history" id="history-' + l.id + '" style="display:none">' + bidRows + '</div>' : '') +
        '</div>' +
        '<div class="card-footer">' +
          (isActive ? '<button class="btn btn-bid btn-sm" onclick="openBidModal(\'' + l.id + '\')">Bid</button>' : '') +
          adminButtons +
        '</div>' +
      '</div>';
    }).join('');
  }

  function toggleHistory(id) {
    var el = document.getElementById('history-' + id);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  // --- Bid ---
  function openBidModal(laptopId) {
    var l = laptops.find(function(x) { return x.id.toString() === laptopId.toString(); });
    var bids = getLaptopBids(laptopId);
    var highestBid = bids.length > 0 ? Number(bids[0].amount) : 0;
    var minBid = highestBid > 0 ? highestBid + 1 : Number(l.startPrice);

    document.getElementById('bidLaptopId').value = laptopId;
    document.getElementById('bidName').value = currentUser.name;
    document.getElementById('bidAmount').value = '';
    document.getElementById('bidAmount').min = minBid;
    document.getElementById('bidAmount').placeholder = minBid.toLocaleString('id-ID');
    document.getElementById('bidMinInfo').textContent = 'Minimum bid: ' + formatRp(minBid);
    document.getElementById('bidModalOverlay').classList.add('active');
  }

  function closeBidModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('bidModalOverlay').classList.remove('active');
  }

  function submitBid() {
    var laptopId = document.getElementById('bidLaptopId').value;
    var amount = parseInt(document.getElementById('bidAmount').value) || 0;

    if (amount <= 0) { showToast('Masukkan jumlah bid', 'error'); return; }

    var btn = document.getElementById('submitBidBtn');
    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    apiPost({
      action: 'submitBid',
      laptopId: laptopId,
      email: currentUser.email,
      name: currentUser.name,
      amount: amount
    }).then(function(result) {
      if (result.error) {
        showToast(result.error, 'error');
      } else {
        showToast('Bid berhasil dikirim!');
        closeBidModal();
        refreshData();
      }
      btn.disabled = false;
      btn.textContent = 'Submit Bid';
    }).catch(function(err) {
      showToast('Gagal mengirim bid: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Submit Bid';
    });
  }

  // --- Admin ---
  function closeLelang(laptopId) {
    if (!confirm('Yakin tutup lelang ini?')) return;
    showLoading(true);
    apiPost({ action: 'closeLelang', laptopId: laptopId, email: currentUser.email }).then(function() {
      showToast('Lelang ditutup');
      refreshData();
    }).catch(function(err) {
      showToast('Gagal: ' + err.message, 'error');
      showLoading(false);
    });
  }

  function reopenLelang(laptopId) {
    showLoading(true);
    apiPost({ action: 'reopenLelang', laptopId: laptopId, email: currentUser.email }).then(function() {
      showToast('Lelang dibuka kembali');
      refreshData();
    }).catch(function(err) {
      showToast('Gagal: ' + err.message, 'error');
      showLoading(false);
    });
  }

  // --- Auto-refresh setiap 30 detik ---
  setInterval(function() {
    if (currentUser && document.visibilityState === 'visible') {
      refreshData();
    }
  }, 30000);

  // --- Init ---
  (function init() {
    showLoading(false);
    var saved = sessionStorage.getItem('auctionUser');
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userName').textContent = currentUser.name + ' (' + currentUser.email + ')';
        refreshData();
      } catch (e) {
        sessionStorage.removeItem('auctionUser');
      }
    }
  })();
</script>
</body>
</html>
